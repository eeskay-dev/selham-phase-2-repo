name: Sync Specs to JIRA

on:
  push:
    branches: [main, develop]
    paths: ['specs/**/*.md']
  pull_request:
    branches: [main]
    paths: ['specs/**/*.md']
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync-jira:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests PyYAML
        
    - name: Sync specs to JIRA
      env:
        # JIRA Configuration - set these in GitHub repository secrets
        JIRA_URL: ${{ secrets.JIRA_URL }}
        JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
        JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        JIRA_PROJECT: ${{ secrets.JIRA_PROJECT }}
        
        # GitHub configuration is auto-detected from GitHub Actions environment
        # No need to set GITHUB_REPO_URL or GITHUB_BRANCH manually
        
        # Optional: Override issue type mappings to match your JIRA project
        # Check your JIRA project's available issue types first
        ISSUE_TYPE_EPIC: "Epic"
        ISSUE_TYPE_STORY: "Task"      # Fallback if "Story" not available
        ISSUE_TYPE_TASK: "Task"       # Use "Task" instead of "Sub-task" 
        ISSUE_TYPE_BUG: "Bug"
        
        # Set to false for production, true for testing
        DRY_RUN: "false"
        
      run: |
        cd scripts
        python jira_sync.py
        
    - name: Upload YAML artifacts (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: jira-sync-yaml-files
        path: /tmp/jira_sync_*/
        retention-days: 7