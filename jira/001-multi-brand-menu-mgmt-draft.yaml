- key: SPEC-001-US5
  summary: Promotional Management (P3)
  description: 'As a restaurant brand administrator, I want to create and manage promotional items and discounts so that I
    can run marketing campaigns and special offers to attract customers.


    **Priority Rationale:** Business growth tool - while not essential for basic operations, promotions are crucial for competitive
    positioning and revenue optimization.


    **Independent Testing:** Can be tested by creating promotional pricing for items, setting discount rules, and verifying
    promotional prices display correctly and are applied during checkout.


    **Acceptance Scenarios:**

    - Given I want to run a promotion,, When I set discounted pricing for items with start/end dates,, Then the promotional
    prices display during the specified period

    - Given I create percentage or fixed-amount discounts,, When customers add promoted items to their cart,, Then the discount
    is properly calculated and applied

    - Given a promotion expires,, When the end date is reached,, Then items automatically revert to regular pricing across
    all platforms



    **Definition of Done:**

    - [ ] Contract specifications defined

    - [ ] Implementation complete

    - [ ] Integration tests passing

    - [ ] Documentation updated

    - [ ] Code reviewed and approved

    '
